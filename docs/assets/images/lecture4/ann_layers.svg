    <line x1="180" y1="410" x2="420" y2="190"/><line x1="180" y1="410" x2="420" y2="280"/><line x1="180" y1="410" x2="420" y2="370"/><line x1="180" y1="410" x2="420" y2="460"/><line x1="180" y1="410" x2="420" y2="550"/>
    <line x1="180" y1="510" x2="420" y2="190"/><line x1="180" y1="510" x2="420" y2="280"/><line x1="180" y1="510" x2="420" y2="370"/><line x1="180" y1="510" x2="420" y2="460"/><line x1="180" y1="510" x2="420" y2="550"/>
    <line x1="420" y1="190" x2="690" y2="230"/><line x1="420" y1="190" x2="690" y2="340"/><line x1="420" y1="190" x2="690" y2="450"/>
    <line x1="420" y1="280" x2="690" y2="230"/><line x1="420" y1="280" x2="690" y2="340"/><line x1="420" y1="280" x2="690" y2="450"/>
    <line x1="420" y1="370" x2="690" y2="230"/><line x1="420" y1="370" x2="690" y2="340"/><line x1="420" y1="370" x2="690" y2="450"/>
    <line x1="420" y1="460" x2="690" y2="230"/><line x1="420" y1="460" x2="690" y2="340"/><line x1="420" y1="460" x2="690" y2="450"/>
    <line x1="420" y1="550" x2="690" y2="230"/><line x1="420" y1="550" x2="690" y2="340"/><line x1="420" y1="550" x2="690" y2="450"/>
    <line x1="690" y1="230" x2="960" y2="340"/><line x1="690" y1="340" x2="960" y2="340"/><line x1="690" y1="450" x2="960" y2="340"/>

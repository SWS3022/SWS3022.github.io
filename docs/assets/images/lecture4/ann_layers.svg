  <text x="82" y="145" class="head">Input features</text><text x="340" y="145" class="head">Hidden layer 1</text><text x="620" y="145" class="head">Hidden layer 2</text><text x="870" y="145" class="head">Output prediction</text>
  <g stroke="#555" stroke-width="1">
    <g fill="#dceeff"><circle cx="150" cy="210" r="31"/><circle cx="150" cy="310" r="31"/><circle cx="150" cy="410" r="31"/><circle cx="150" cy="510" r="31"/></g>
    <g fill="#daf2de"><circle cx="420" cy="190" r="31"/><circle cx="420" cy="280" r="31"/><circle cx="420" cy="370" r="31"/><circle cx="420" cy="460" r="31"/><circle cx="420" cy="550" r="31"/></g>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Artificial Neural Network Layers</title>
  <desc id="desc">Neural network layers transforming input features into a risk prediction.</desc>
  <style>
    .title{font:700 28px Arial,sans-serif;fill:#111}.head{font:700 20px Arial,sans-serif;fill:#111}.label{font:14px Arial,sans-serif;fill:#333}.small{font:15px Arial,sans-serif;fill:#555}
  </style>
  <rect width="1200" height="720" fill="#fff"/>
  <text x="40" y="62" class="title">Artificial Neural Network: Layers Transform Inputs into Predictions</text>
  <g stroke="#c9ced6" stroke-width="1.2">
    <line x1="180" y1="210" x2="420" y2="190"/><line x1="180" y1="210" x2="420" y2="280"/><line x1="180" y1="210" x2="420" y2="370"/><line x1="180" y1="210" x2="420" y2="460"/><line x1="180" y1="210" x2="420" y2="550"/>

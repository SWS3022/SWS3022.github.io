<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">ROC and Confusion Matrix</title>
  <desc id="desc">Synthetic ROC curve and confusion matrix diagram.</desc>
  <style>.title{font:700 28px Arial,sans-serif;fill:#111}.head{font:700 21px Arial,sans-serif;fill:#111}.label{font:15px Arial,sans-serif;fill:#555}.axis{stroke:#444;stroke-width:2}.grid{stroke:#e5e7eb;stroke-width:1}</style>
  <rect width="1200" height="720" fill="#fff"/><text x="40" y="62" class="title">Evaluation Demo: ROC Curve and Confusion Matrix</text>
  <text x="85" y="115" class="head">ROC curve: ranking quality across thresholds</text>
  <g transform="translate(90 155)">
    <line x1="0" y1="86" x2="455" y2="86" class="grid"/><line x1="0" y1="172" x2="455" y2="172" class="grid"/><line x1="0" y1="258" x2="455" y2="258" class="grid"/><line x1="0" y1="344" x2="455" y2="344" class="grid"/>
    <line x1="91" y1="0" x2="91" y2="430" class="grid"/><line x1="182" y1="0" x2="182" y2="430" class="grid"/><line x1="273" y1="0" x2="273" y2="430" class="grid"/><line x1="364" y1="0" x2="364" y2="430" class="grid"/>
    <line x1="0" y1="430" x2="455" y2="430" class="axis"/><line x1="0" y1="0" x2="0" y2="430" class="axis"/>
    <line x1="0" y1="430" x2="455" y2="0" stroke="#888" stroke-width="2" stroke-dasharray="6 4"/>
    <polyline points="0,430 23,310 73,194 146,116 250,60 355,26 455,0" fill="none" stroke="#4f87b8" stroke-width="4"/>
    <text x="185" y="64" class="label" fill="#4f87b8">AUC summarizes separation ability</text>
    <text x="185" y="472" class="label">False positive rate</text><text x="-4" y="-16" class="label">True positive rate</text>
  </g>
  <text x="685" y="115" class="head">Confusion matrix: one chosen threshold</text>
  <text x="718" y="168" class="label">Predicted negative</text><text x="860" y="168" class="label">Predicted positive</text>
  <text x="603" y="256" class="label">Actual negative</text><text x="604" y="400" class="label">Actual positive</text>
  <g transform="translate(705 185)" stroke="#555" stroke-width="1">
    <rect x="0" y="0" width="145" height="145" fill="#dceeff"/><rect x="145" y="0" width="145" height="145" fill="#ffe2e2"/>
    <rect x="0" y="145" width="145" height="145" fill="#ffedcc"/><rect x="145" y="145" width="145" height="145" fill="#daf2de"/>
    <text x="73" y="68" text-anchor="middle" font="17px Arial">TN</text><text x="73" y="92" text-anchor="middle" font="16px Arial">correct non-event</text>
    <text x="218" y="68" text-anchor="middle" font="17px Arial">FP</text><text x="218" y="92" text-anchor="middle" font="16px Arial">false alarm</text>
    <text x="73" y="213" text-anchor="middle" font="17px Arial">FN</text><text x="73" y="237" text-anchor="middle" font="16px Arial">missed event</text>
    <text x="218" y="213" text-anchor="middle" font="17px Arial">TP</text><text x="218" y="237" text-anchor="middle" font="16px Arial">found event</text>
  </g>
  <text x="700" y="562" class="label">Metric choice depends on which error is more costly.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">CNN Filter and Feature Map</title>
  <desc id="desc">CNN pipeline from image-like grid through filter, feature map, pooling, and classifier.</desc>
  <style>.title{font:700 28px Arial,sans-serif;fill:#111}.head{font:700 21px Arial,sans-serif;fill:#111}.label{font:15px Arial,sans-serif;fill:#555}.box{stroke:#555;stroke-width:1}.arrow{stroke:#444;stroke-width:3;fill:none}</style>
  <rect width="1200" height="720" fill="#fff"/><text x="40" y="62" class="title">CNN: Sliding Filters Learn Local Visual Patterns</text>
  <text x="105" y="132" class="head">Input image-like grid</text><text x="445" y="132" class="head">Filter / kernel</text><text x="700" y="132" class="head">Feature map</text><text x="955" y="132" class="head">Pooling / classifier</text>

    <text x="20" y="75" font="17px Arial">+</text><text x="64" y="75" font="17px Arial">+</text><text x="110" y="75" font="17px Arial">+</text>
    <text x="20" y="119" font="17px Arial">-</text><text x="64" y="119" font="17px Arial">+</text><text x="110" y="119" font="17px Arial">-</text>

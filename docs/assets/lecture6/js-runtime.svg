<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript runtime diagram</title>
  <desc id="desc">A diagram showing JavaScript code, ECMAScript language core, and browser runtime APIs.</desc>
  <rect width="960" height="430" fill="#f8fafc"/>
  <text x="480" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">JavaScript Runtime</text>
  <g font-family="Arial, sans-serif">
    <rect x="310" y="75" width="340" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="480" y="116" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">Your JavaScript code</text>

    <path d="M480 150 V187" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="255" y="195" width="450" height="72" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="480" y="224" text-anchor="middle" font-size="20" font-weight="700" fill="#0369a1">ECMAScript language core</text>
    <text x="480" y="251" text-anchor="middle" font-size="15" fill="#334155">variables, functions, objects, arrays, promises</text>

    <path d="M480 276 V313" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="120" y="320" width="720" height="78" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
    <text x="480" y="350" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">Browser runtime APIs</text>
    <text x="480" y="377" text-anchor="middle" font-size="15" fill="#334155">DOM | Events | Fetch API | localStorage | Canvas | Console</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Nested object tree</title>
  <desc id="desc">A diagram showing an account object with nested cars object.</desc>
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Object Represents Named Data</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="180" width="180" height="76" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="160" y="226" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">account</text>

    <path d="M250 218 H340" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g font-size="18">
      <rect x="360" y="86" width="240" height="44" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
      <text x="480" y="115" text-anchor="middle" fill="#1f2937">accountNo: "ADB3256"</text>
      <rect x="360" y="146" width="240" height="44" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
      <text x="480" y="175" text-anchor="middle" fill="#1f2937">name: "James"</text>
      <rect x="360" y="206" width="240" height="44" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
      <text x="480" y="235" text-anchor="middle" fill="#1f2937">type: "savings"</text>
      <rect x="360" y="266" width="240" height="44" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
      <text x="480" y="295" text-anchor="middle" fill="#1f2937">balance: 500</text>
      <rect x="360" y="326" width="240" height="44" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
      <text x="480" y="355" text-anchor="middle" fill="#9a3412">cars: object</text>
    </g>

    <path d="M600 348 H675" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="695" y="290" width="195" height="44" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="792" y="319" text-anchor="middle" font-size="18" fill="#1f2937">car1: "BMW"</text>
    <rect x="695" y="350" width="195" height="44" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="792" y="379" text-anchor="middle" font-size="18" fill="#1f2937">car2: "Audi"</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>

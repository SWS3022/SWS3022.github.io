<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Array index diagram</title>
  <desc id="desc">A diagram showing array indexes 0 to 3 for bank names DBS, HSBC, OCBC, and UOB.</desc>
  <rect width="960" height="320" fill="#f8fafc"/>
  <text x="480" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Array Index Starts at 0</text>
  <text x="480" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">const banks = ["DBS", "HSBC", "OCBC", "UOB"];</text>
  <g font-family="Arial, sans-serif">
    <g transform="translate(145 140)">
      <rect width="160" height="78" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
      <text x="80" y="-18" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">index 0</text>
      <text x="80" y="49" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">DBS</text>
    </g>
    <g transform="translate(320 140)">
      <rect width="160" height="78" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
      <text x="80" y="-18" text-anchor="middle" font-size="20" font-weight="700" fill="#0369a1">index 1</text>
      <text x="80" y="49" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">HSBC</text>
    </g>
    <g transform="translate(495 140)">
      <rect width="160" height="78" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
      <text x="80" y="-18" text-anchor="middle" font-size="20" font-weight="700" fill="#15803d">index 2</text>
      <text x="80" y="49" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">OCBC</text>
    </g>
    <g transform="translate(670 140)">
      <rect width="160" height="78" rx="10" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
      <text x="80" y="-18" text-anchor="middle" font-size="20" font-weight="700" fill="#c2410c">index 3</text>
      <text x="80" y="49" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">UOB</text>
    </g>
  </g>
  <text x="480" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">banks[0] is DBS, banks[3] is UOB</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">HTML CSS JavaScript layer responsibilities</title>
  <desc id="desc">A three-layer diagram showing HTML for structure, CSS for style, and JavaScript for behavior.</desc>
  <rect width="960" height="360" fill="#f8fafc"/>
  <text x="480" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Web Page Responsibilities</text>
  <g font-family="Arial, sans-serif">
    <rect x="95" y="95" width="220" height="170" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="205" y="138" text-anchor="middle" font-size="28" font-weight="700" fill="#1d4ed8">HTML</text>
    <text x="205" y="178" text-anchor="middle" font-size="19" fill="#1e3a8a">Page structure</text>
    <text x="205" y="214" text-anchor="middle" font-size="16" fill="#334155">headings</text>
    <text x="205" y="240" text-anchor="middle" font-size="16" fill="#334155">forms</text>
    <text x="205" y="266" text-anchor="middle" font-size="16" fill="#334155">tables</text>

    <rect x="370" y="95" width="220" height="170" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="480" y="138" text-anchor="middle" font-size="28" font-weight="700" fill="#15803d">CSS</text>
    <text x="480" y="178" text-anchor="middle" font-size="19" fill="#166534">Visual style</text>
    <text x="480" y="214" text-anchor="middle" font-size="16" fill="#334155">layout</text>
    <text x="480" y="240" text-anchor="middle" font-size="16" fill="#334155">color</text>
    <text x="480" y="266" text-anchor="middle" font-size="16" fill="#334155">spacing</text>

    <rect x="645" y="95" width="220" height="170" rx="14" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
    <text x="755" y="138" text-anchor="middle" font-size="28" font-weight="700" fill="#c2410c">JavaScript</text>
    <text x="755" y="178" text-anchor="middle" font-size="19" fill="#9a3412">Interaction and logic</text>
    <text x="755" y="214" text-anchor="middle" font-size="16" fill="#334155">clicks</text>
    <text x="755" y="240" text-anchor="middle" font-size="16" fill="#334155">calculation</text>
    <text x="755" y="266" text-anchor="middle" font-size="16" fill="#334155">updates</text>
  </g>
  <path d="M318 180 H362" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M593 180 H637" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>

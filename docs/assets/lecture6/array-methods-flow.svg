<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470" role="img" aria-labelledby="title desc">
  <title id="title">Map filter reduce flow</title>
  <desc id="desc">A diagram showing transactions flowing through map, filter, and reduce operations.</desc>
  <rect width="960" height="470" fill="#f8fafc"/>
  <text x="480" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Array Methods Process Data</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="85" width="210" height="88" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="175" y="118" text-anchor="middle" font-size="21" font-weight="700" fill="#0369a1">transactions</text>
    <text x="175" y="147" text-anchor="middle" font-size="15" fill="#334155">array of objects</text>
    <path d="M290 129 H410" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="430" y="85" width="160" height="88" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="510" y="137" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">map</text>
    <path d="M600 129 H720" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="740" y="85" width="150" height="88" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
    <text x="815" y="137" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">amounts</text>

    <rect x="70" y="205" width="210" height="88" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="175" y="238" text-anchor="middle" font-size="21" font-weight="700" fill="#0369a1">transactions</text>
    <text x="175" y="267" text-anchor="middle" font-size="15" fill="#334155">array of objects</text>
    <path d="M290 249 H410" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="430" y="205" width="160" height="88" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="510" y="257" text-anchor="middle" font-size="24" font-weight="700" fill="#15803d">filter</text>
    <path d="M600 249 H720" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="740" y="205" width="150" height="88" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
    <text x="815" y="247" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">deposit</text>
    <text x="815" y="272" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">transactions</text>

    <rect x="70" y="325" width="210" height="88" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="175" y="358" text-anchor="middle" font-size="21" font-weight="700" fill="#0369a1">transactions</text>
    <text x="175" y="387" text-anchor="middle" font-size="15" fill="#334155">array of objects</text>
    <path d="M290 369 H410" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="430" y="325" width="160" height="88" rx="12" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
    <text x="510" y="377" text-anchor="middle" font-size="24" font-weight="700" fill="#c2410c">reduce</text>
    <path d="M600 369 H720" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="740" y="325" width="150" height="88" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
    <text x="815" y="377" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">total</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
